function fromB64(str){const bs=atob(str);const arr=new Uint8Array(bs.length);for(let i=0;i<bs.length;i++)arr[i]=bs.charCodeAt(i);return arr;}
async function deriveKey(pw){const salt=fromB64(SALT_B64);const ikm=new TextEncoder().encode(pw);const bk=await crypto.subtle.importKey('raw',ikm,'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);}
async function decrypt(entry,key){const iv=fromB64(entry.data.iv);const tag=fromB64(entry.data.tag);const ct=fromB64(entry.data.data);const c=new Uint8Array(ct.length+tag.length);c.set(ct,0);c.set(tag,ct.length);const p=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,c);return new TextDecoder().decode(p);}
