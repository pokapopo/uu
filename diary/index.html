<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日记 · uu</title>
  <style>
    body { max-width: 640px; margin: 80px auto; padding: 0 20px; font-family: Georgia, "STKaiti", serif; background: #faf6ee; color: #3a3a3a; line-height: 1.8; }
    h1 { color: #8b4a3a; font-size: 1.4em; }
    .date { color: #8b4a3a; font-size: 0.9em; margin-top: 2em; }
    .entry { margin-top: 0.5em; white-space: pre-wrap; }
    .lock { text-align: center; margin-top: 120px; }
    .lock input { padding: 8px 12px; border: 1px solid #d4a0a0; border-radius: 4px; background: #fff; font-size: 1em; }
    .lock button { padding: 8px 16px; border: none; background: #8b4a3a; color: #fff; border-radius: 4px; cursor: pointer; font-size: 1em; }
    .hidden { display: none; }
    #wrong { color: #c0392b; margin-top: 8px; }
    #loading { color: #8b4a3a; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="lock" class="lock">
    <p>📒 这本日记需要密码才能看</p>
    <input type="password" id="pw" placeholder="输入密码">
    <button onclick="unlock()">打开</button>
    <p id="wrong" class="hidden">密码不对哦</p>
    <p id="loading" class="hidden">解密中...</p>
  </div>
  <div id="diary" class="hidden"></div>

<script>

function fromB64(str){const bs=atob(str);const arr=new Uint8Array(bs.length);for(let i=0;i<bs.length;i++)arr[i]=bs.charCodeAt(i);return arr;}
async function deriveKey(pw){const salt=fromB64(SALT_B64);const ikm=new TextEncoder().encode(pw);const bk=await crypto.subtle.importKey('raw',ikm,'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},bk,{name:'AES-GCM',length:256},false,['decrypt']);}
async function decrypt(entry,key){const iv=fromB64(entry.data.iv);const tag=fromB64(entry.data.tag);const ct=fromB64(entry.data.data);const c=new Uint8Array(ct.length+tag.length);c.set(ct,0);c.set(tag,ct.length);const p=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,c);return new TextDecoder().decode(p);}
async function unlock(){const pw=document.getElementById('pw').value;document.getElementById('wrong').classList.add('hidden');document.getElementById('loading').classList.remove('hidden');try{const key=await deriveKey(pw);const entries=[];for(const e of ENCRYPTED){entries.push({date:e.date,title:e.title,text:await decrypt(e,key)});}document.getElementById('lock').classList.add('hidden');const d=document.getElementById('diary');d.classList.remove('hidden');d.innerHTML=entries.map(e=>'<div class="date">'+e.date+' '+e.title+'</div><div class="entry">'+e.text+'</div>').join('');sessionStorage.setItem('diary_ok','1');}catch{ document.getElementById('wrong').classList.remove('hidden'); }document.getElementById('loading').classList.add('hidden');}
if(sessionStorage.getItem('diary_ok'))document.getElementById('lock').querySelector('p').textContent='📒 重新解锁';
</script>
</body>
</html>
