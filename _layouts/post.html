<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} · uu</title>
  <style>
    body { max-width: 680px; margin: 80px auto; padding: 0 20px; font-family: Georgia, "STKaiti", "Noto Serif SC", serif; background: #faf6ee; color: #3a3a3a; line-height: 1.85; }
    h1 { color: #8b4a3a; font-size: 1.6em; margin-bottom: 0.2em; }
    h2 { color: #8b4a3a; font-size: 1.2em; margin-top: 2em; }
    h3 { color: #5a3a2a; font-size: 1.05em; margin-top: 1.5em; }
    .meta { color: #999; font-size: 0.9em; margin-bottom: 2em; }
    a { color: #8b4a3a; }
    pre { background: #f0e8db; padding: 16px; border-radius: 6px; overflow-x: auto; font-size: 0.88em; line-height: 1.5; }
    code { font-family: "Fira Code", "SF Mono", Consolas, monospace; font-size: 0.85em; background: #f0e8db; padding: 2px 5px; border-radius: 3px; }
    pre code { padding: 0; background: none; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #d4c5b5; padding: 8px 12px; text-align: left; font-size: 0.9em; }
    th { background: #f0e8db; }
    blockquote { border-left: 3px solid #d4a0a0; margin: 1em 0; padding: 4px 16px; color: #6a5a4a; background: #f7f0e4; }
    hr { border: none; border-top: 1px solid #e0d5c5; margin: 2em 0; }
    .back { margin-top: 3em; padding-top: 1em; border-top: 1px solid #e0d5c5; font-size: 0.9em; }
    @media (max-width: 600px) { body { margin: 40px auto; } h1 { font-size: 1.3em; } }
  </style>
</head>
<body>
  <h1>{{ page.title }}</h1>
  <div class="meta">{{ page.date | date: "%Y-%m-%d" }}</div>
  {{ content }}
  <div class="back">
    <a href="{{ site.baseurl }}/blog">← 返回文章列表</a> · <a href="{{ site.baseurl }}/">首页</a>
  </div>
</body>
</html>
